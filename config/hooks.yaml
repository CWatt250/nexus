  #   timeout: 60

on_error: []
  # - name: log-error
  #   command: "echo \"$(date -Is) task $NEXUS_HOOK_TASK_ID: $NEXUS_HOOK_ERROR\" >> ~/AI_Agent/memory/errors.log"

pre_tool: []
post_tool: []
