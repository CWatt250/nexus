# Phase 28 + 29 — Claude Code dispatch cost guardrails.
#
# per_tier: per-dispatch ceiling in USD per tier. null = no limit.
#   max:    null  — covered by Max plan subscription, no marginal $ to gate
#   flash:  0.10  — DeepSeek V4-Flash; tiny prompts cost ~$0.005, cap leaves
#                   plenty of headroom for an outlier
#   pro:    0.50  — DeepSeek V4-Pro; ~$0.05 typical
#   api:    2.00  — Anthropic Sonnet 4.6 via API key; this is the fallback
#                   path when /max isn't appropriate, so the cap reflects
#                   that — Sonnet runs ~$0.10–1.00 typical, 2.00 catches
#                   runaways
#   local:  null  — qwen3-coder:30b on-box, no marginal cost
#   quick:  null  — qwen3:4b chat path, not a dispatcher tier (kept here
#                   for symmetry; cc_dispatcher never sees this tier)
#
# per_day_usd: rolling 24h ceiling across PAID tiers only (flash + pro
#   + api). max / local / quick spend is excluded since they don't bill
#   per-token. Above 80% the dispatcher posts a warning to Telegram;
#   at 100% new paid-tier dispatches are refused until UTC midnight.

per_tier:
  max:   null
  flash: 0.10
  pro:   0.50
  api:   2.00
  local: null
  quick: null

per_day_usd: 15.00

# Phase 32 — quick_chat / classifier provider config.
#
#   provider:             'deepseek' (default) routes the chat + intent
#                         classifier through DeepSeek's API. Set to
#                         'ollama' to force the local fallback path
#                         without a code change (offline, debugging).
#   deepseek_model:       which DeepSeek chat model to call. Pinned so
#                         a model deprecation can't silently shift cost.
#   daily_cost_max_usd:   safety ceiling on DeepSeek quick_chat spend
#                         per UTC day. When today's running total in
#                         memory/quick_chat_costs.jsonl crosses this,
#                         further calls fall back to Ollama and a one-
#                         shot Telegram warning fires.
#   ollama_fallback_model: the local model used whenever DeepSeek is
#                         skipped — circuit breaker open, daily ceiling
#                         hit, network failure, or provider='ollama'.
quick_chat:
  provider: deepseek
  deepseek_model: deepseek-chat
  daily_cost_max_usd: 5.00
  ollama_fallback_model: qwen3:4b
