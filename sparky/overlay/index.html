<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sparky</title>
  <style>
    /* ---------------- Tokens ---------------- */
    :root {
      --squish-x: 1.25;
      --squish-y: 0.75;
      --stretch-x: 0.85;
      --stretch-y: 1.2;
      --spring:       cubic-bezier(.34, 1.56, .64, 1);
      --spring-land:  cubic-bezier(.2, .8, .4, 1.3);
      --spring-soft:  cubic-bezier(.25, .8, .35, 1);
      --card-bg:      #1E1E2E;
      --card-border:  #3B3B52;
      --card-text:    #ffffff;
      --card-subtle:  #9CA3AF;
      --action-bg:    #FACC15;
      --action-fg:    #1F2937;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* ---------------- Sparky ---------------- */
    #sparky-container {
      position: absolute;
      right: 40px;
      top: 90px;
      width: 200px;
      height: 200px;
      -webkit-app-region: no-drag;
      cursor: pointer;
      transform-origin: center bottom;
      will-change: transform;
    }
    #sparky {
      width: 200px;
      height: 200px;
      pointer-events: none;
    }
    #emoji-bubble {
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 28px;
      opacity: 0;
      transition: opacity 0.3s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      pointer-events: none;
    }
    #emoji-bubble.visible {
      opacity: 1;
      animation: float-up 2s ease-out forwards;
    }
    @keyframes float-up {
      0%   { transform: translateY(0)    scale(1);   opacity: 1; }
      70%  { transform: translateY(-20px) scale(1.1); opacity: 1; }
      100% { transform: translateY(-30px) scale(0.8); opacity: 0; }
    }

    /* ---------------- Spring-physics state animations ----------------
       Idle / working / talking are deliberately subtle — tiny 3–4 px
       vertical movement. Happy and whammy keep the dramatic beats.    */

    .state-idle #sparky-container {
      animation: idle-bob 3.2s var(--spring-soft) infinite;
    }
    @keyframes idle-bob {
      0%,100% { transform: translateY(0)    scaleX(1)    scaleY(1); }
      45%     { transform: translateY(-3px) scaleX(0.98) scaleY(1.02); }
      75%     { transform: translateY(0)    scaleX(1.03) scaleY(0.97); }
    }

    .state-thinking #sparky-container {
      animation: thinking-shake 0.55s ease-in-out infinite;
    }
    @keyframes thinking-shake {
      0%,100% { transform: translateX(0)   scaleX(1)    scaleY(1); }
      25%     { transform: translateX(-2px) scaleX(1.02) scaleY(0.99) rotate(-1deg); }
      75%     { transform: translateX(2px)  scaleX(1.02) scaleY(0.99) rotate(1deg); }
    }

    .state-working #sparky-container {
      animation: working-bob 1.4s var(--spring-soft) infinite;
    }
    @keyframes working-bob {
      0%,100% { transform: translateY(0)    scaleX(1)    scaleY(1); }
      50%     { transform: translateY(-4px) scaleX(0.97) scaleY(1.03); }
      80%     { transform: translateY(0)    scaleX(1.04) scaleY(0.96); }
    }

    .state-excited #sparky-container {
      animation: excited-bounce 0.9s ease-in-out infinite;
    }
    @keyframes excited-bounce {
      0%   { transform: translateY(0)    scaleX(1)    scaleY(1); }
      12%  { transform: translateY(-3px) scaleX(0.97) scaleY(1.06); }
      24%  { transform: translateY(0)    scaleX(1.1)  scaleY(0.92); }
      40%  { transform: translateY(-6px) scaleX(0.92) scaleY(1.12); }
      55%  { transform: translateY(0)    scaleX(1.18) scaleY(0.84); }
      74%  { transform: translateY(-9px) scaleX(0.88) scaleY(1.18); }
      88%  { transform: translateY(0)    scaleX(var(--squish-x)) scaleY(var(--squish-y)); }
      100% { transform: translateY(0)    scaleX(1)    scaleY(1); }
    }

    .state-happy #sparky-container {
      animation: happy-jump 0.7s var(--spring-land);
    }
    @keyframes happy-jump {
      0%   { transform: translateY(0)    scaleX(var(--squish-x)) scaleY(var(--squish-y)); }
      12%  { transform: translateY(-10px) scaleX(0.9)  scaleY(1.15); }
      30%  { transform: translateY(-30px) scaleX(var(--stretch-x)) scaleY(var(--stretch-y)); }
      52%  { transform: translateY(-6px)  scaleX(1)    scaleY(1); }
      68%  { transform: translateY(0)    scaleX(var(--squish-x)) scaleY(var(--squish-y)); }
      84%  { transform: translateY(0)    scaleX(1.08) scaleY(0.94); }
      100% { transform: translateY(0)    scaleX(1)    scaleY(1); }
    }

    .state-error #sparky-container {
      animation: error-shake 0.3s ease-in-out 3;
    }
    .state-error #sparky { filter: hue-rotate(180deg) saturate(1.5); }
    @keyframes error-shake {
      0%,100% { transform: translateX(0)   scaleX(1)    scaleY(1); }
      20%     { transform: translateX(-8px) scaleX(1.06) scaleY(0.94); }
      40%     { transform: translateX(8px)  scaleX(1.06) scaleY(0.94); }
      60%     { transform: translateX(-8px) scaleX(1.06) scaleY(0.94); }
      80%     { transform: translateX(8px)  scaleX(1.06) scaleY(0.94); }
    }

    .state-sleeping #sparky-container {
      animation: sleeping-sway 4s ease-in-out infinite;
    }
    .state-sleeping #sparky { opacity: 0.7; }
    @keyframes sleeping-sway {
      0%,100% { transform: rotate(0deg)  scaleX(1) scaleY(1); }
      25%     { transform: rotate(-3deg) scaleX(1) scaleY(1); }
      75%     { transform: rotate(3deg)  scaleX(1) scaleY(1); }
    }

    .state-whammy #sparky-container {
      animation: whammy-full 1.25s ease-in-out;
    }
    .state-whammy #sparky { filter: drop-shadow(0 0 15px #FACC15); }
    @keyframes whammy-full {
      0%   { transform: translateX(0)   scaleX(1) scaleY(1); }
      6%   { transform: translateX(-1px) scaleX(1.01) scaleY(0.99); }
      12%  { transform: translateX(1px)  scaleX(1.01) scaleY(0.99); }
      20%  { transform: translateX(-2px) scaleX(1.03) scaleY(0.97); }
      28%  { transform: translateX(2px)  scaleX(1.03) scaleY(0.97); }
      36%  { transform: translateX(-3px) scaleX(1.06) scaleY(0.94); }
      44%  { transform: translateX(3px)  scaleX(1.06) scaleY(0.94); }
      52%  { transform: translateX(0)   scaleX(0.72) scaleY(1.34); }
      62%  { transform: translateX(0)   scaleX(1.38) scaleY(0.66); }
      76%  { transform: translateX(0)   scaleX(var(--squish-x)) scaleY(var(--squish-y)); }
      88%  { transform: translateX(0)   scaleX(1.06) scaleY(0.95); }
      100% { transform: translateX(0)   scaleX(1)    scaleY(1); }
    }

    .state-talking #sparky-container {
      animation: talking-bob 0.95s var(--spring-soft) infinite;
    }
    @keyframes talking-bob {
      0%,100% { transform: translateY(0)    scaleX(1)    scaleY(1); }
      50%     { transform: translateY(-2px) scaleX(0.98) scaleY(1.02); }
    }

    .landing #sparky-container {
      animation: landing-squish 150ms var(--spring-land) !important;
    }
    @keyframes landing-squish {
      0%   { transform: scaleX(1)              scaleY(1); }
      45%  { transform: scaleX(var(--squish-x)) scaleY(var(--squish-y)); }
      70%  { transform: scaleX(0.96)           scaleY(1.04); }
      100% { transform: scaleX(1)              scaleY(1); }
    }

    /* ---------------- iMessage bubble ---------------- */
    #bubble {
      position: absolute;
      top: 12px;
      right: 20px;
      width: 240px;
      max-width: 240px;
      transform: translateY(6px) scale(0.85);
      padding: 9px 13px 10px 13px;
      background: #ffffff;
      color: #1f2937;
      border-radius: 18px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.32;
      font-weight: 500;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28), 0 1px 2px rgba(0, 0, 0, 0.18);
      opacity: 0;
      pointer-events: none;
      z-index: 40;
      transition:
        opacity 260ms ease,
        transform 320ms var(--spring-land);
      word-break: break-word;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-top: 9px solid #ffffff;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.12));
    }
    #bubble.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    #bubble.fading-up {
      opacity: 0;
      transform: translateY(-18px) scale(0.95);
      transition:
        opacity 260ms ease,
        transform 280ms var(--spring-soft);
    }

    /* ---------------- Deliverable cards ---------------- */
    #cards {
      position: absolute;
      left: 14px;
      top: 90px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      z-index: 35;
    }
    .card {
      position: relative;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--card-text);
      border-radius: 12px;
      padding: 10px 12px 11px 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      opacity: 0;
      transform: translateX(-40px) scale(0.95);
      transition:
        opacity 300ms ease,
        transform 360ms var(--spring-land);
      pointer-events: auto;
      -webkit-app-region: no-drag;
    }
    .card.in {
      opacity: 1;
      transform: translateX(0) scale(1);
    }
    .card.out {
      opacity: 0;
      transform: translateX(-30px) scale(0.92);
    }
    .card .card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card .card-emoji {
      font-size: 15px;
      line-height: 18px;
      flex: 0 0 auto;
    }
    .card .card-title {
      flex: 1 1 auto;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .card .card-close {
      flex: 0 0 auto;
      background: transparent;
      border: none;
      color: #6B7280;
      font-size: 16px;
      line-height: 14px;
      padding: 2px 5px;
      cursor: pointer;
      border-radius: 4px;
    }
    .card .card-close:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }
    .card .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 7px;
      gap: 8px;
    }
    .card .card-subtitle {
      flex: 1 1 auto;
      color: var(--card-subtle);
      font-size: 11px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }
    .card .card-action {
      flex: 0 0 auto;
      background: var(--action-bg);
      color: var(--action-fg);
      border: none;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }
    .card .card-action:hover   { filter: brightness(1.1); }
    .card .card-action:active  { transform: scale(0.96); }

    /* ---------------- Status + mute ---------------- */
    #status {
      position: absolute;
      bottom: 8px;
      right: 14px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      color: #0EA5E9;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      opacity: 0.8;
      pointer-events: none;
    }
    #mute-btn {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      line-height: 18px;
      opacity: 0.5;
      cursor: pointer;
      user-select: none;
      -webkit-app-region: no-drag;
      padding: 2px 6px;
      border-radius: 6px;
      transition: opacity 120ms ease, background 120ms ease;
    }
    #mute-btn:hover {
      opacity: 1;
      background: rgba(255,255,255,0.08);
    }

    /* ---------------- Context menu ---------------- */
    #context-menu {
      position: absolute;
      display: none;
      min-width: 140px;
      padding: 4px 0;
      background: rgba(15, 23, 42, 0.96);
      color: #f1f5f9;
      border: 1px solid rgba(14, 165, 233, 0.5);
      border-radius: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      z-index: 9999;
      -webkit-app-region: no-drag;
    }
    #context-menu .menu-item {
      padding: 7px 14px;
      cursor: pointer;
      user-select: none;
    }
    #context-menu .menu-item:hover {
      background: rgba(14, 165, 233, 0.25);
    }
    #context-menu .menu-sep {
      height: 1px;
      background: rgba(148, 163, 184, 0.25);
      margin: 3px 0;
    }
  </style>
</head>
<body class="state-idle">
  <div id="bubble"></div>
  <div id="cards"></div>

  <div id="sparky-container">
    <object id="sparky" type="image/svg+xml" data="../sparky.svg"></object>
    <div id="emoji-bubble"></div>
  </div>

  <div id="status">idle</div>
  <div id="mute-btn" title="Mute / unmute Sparky TTS">🔊</div>

  <div id="context-menu">
    <div class="menu-item" data-action="hide">Hide</div>
    <div class="menu-item" data-action="settings">Settings</div>
    <div class="menu-sep"></div>
    <div class="menu-item" data-action="whammy">Test WHAMMY</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const body = document.body;
    const emojiBubble = document.getElementById('emoji-bubble');
    const statusDiv = document.getElementById('status');
    const sparkyObj = document.getElementById('sparky');
    const sparkyContainer = document.getElementById('sparky-container');
    const contextMenu = document.getElementById('context-menu');
    const bubble = document.getElementById('bubble');
    const cardsRoot = document.getElementById('cards');
    const muteBtn = document.getElementById('mute-btn');

    const TRACKING_RADIUS = 200;
    const PUPIL_MAX_OFFSET = 4;
    const PUPIL_BASE_L = { cx: 75, cy: 87 };
    const PUPIL_BASE_R = { cx: 125, cy: 87 };
    // Sparky container is 200 × 200, anchored at right: 40, top: 90, so
    // his visual center on-screen is (win.right - 140, win.top + 190).
    const SPARKY_RIGHT_OFFSET = 140;
    const SPARKY_CY_OFFSET = 190;

    const MAX_VISIBLE_CARDS = 3;
    const CARD_TTL_MS = 10_000;

    const emojiMap = {
      thinking: '💭',
      idea: '💡',
      whammy: '⚡',
      excited: '🔥',
      sleeping: '💤',
      error: '❌',
      happy: '✨',
      working: '⚙️',
    };

    let currentState = 'idle';
    let lastActivity = Date.now();
    let landingTimer = null;

    function setState(newState) {
      if (!newState || newState === currentState) return;
      body.className = `state-${newState}`;
      currentState = newState;
      statusDiv.textContent = newState;
      const e = emojiMap[newState];
      if (e) showEmoji(e);
      lastActivity = Date.now();
      triggerLanding();
    }

    function triggerLanding() {
      if (landingTimer) clearTimeout(landingTimer);
      body.classList.add('landing');
      void sparkyContainer.offsetWidth;
      landingTimer = setTimeout(() => body.classList.remove('landing'), 160);
    }

    function showEmoji(emoji) {
      emojiBubble.textContent = emoji;
      emojiBubble.classList.remove('visible');
      void emojiBubble.offsetWidth;
      emojiBubble.classList.add('visible');
      setTimeout(() => emojiBubble.classList.remove('visible'), 2000);
    }

    async function httpPost(path, body) {
      try {
        await fetch(`http://localhost:11437${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
      } catch (e) { /* bridge may be down */ }
    }

    async function postStateHttp(state, message) {
      return httpPost('/state', message ? { state, message } : { state });
    }

    // ---------------- iMessage bubble ----------------
    let bubbleTypeTimer = null;
    let bubbleHideTimer = null;

    function clearBubbleTimers() {
      if (bubbleTypeTimer) { clearTimeout(bubbleTypeTimer); bubbleTypeTimer = null; }
      if (bubbleHideTimer) { clearTimeout(bubbleHideTimer); bubbleHideTimer = null; }
    }

    function renderBubble(text) {
      clearBubbleTimers();
      bubble.textContent = '';
      bubble.classList.remove('fading-up');
      void bubble.offsetWidth;
      bubble.classList.add('visible');
      let i = 0;
      const step = 24;
      function tick() {
        if (i >= text.length) { bubbleTypeTimer = null; return; }
        bubble.textContent += text[i++];
        bubbleTypeTimer = setTimeout(tick, step);
      }
      tick();
      const visibleMs = Math.max(2500, text.length * 100);
      bubbleHideTimer = setTimeout(() => {
        bubble.classList.remove('visible');
        bubble.classList.add('fading-up');
        setTimeout(() => {
          bubble.classList.remove('fading-up');
          bubble.textContent = '';
        }, 320);
      }, visibleMs);
    }

    function showBubble(text) {
      if (!text) return;
      if (bubble.classList.contains('visible')) {
        clearBubbleTimers();
        bubble.classList.remove('visible');
        bubble.classList.add('fading-up');
        setTimeout(() => {
          bubble.classList.remove('fading-up');
          renderBubble(text);
        }, 280);
      } else {
        renderBubble(text);
      }
    }

    // ---------------- Cards ----------------
    /* Each card has its own dismiss timer. Hovering pauses dismissal.
       Stack order: newest first at the top; when we exceed MAX_VISIBLE
       cards the oldest (last child) fades out. */
    const CARD_DEFAULT_ACTIONS = {
      file:    'Open',
      url:     'Play',
      github:  'View',
      command: 'Copy',
      message: null,
    };
    const CARD_EMOJI = {
      file:    '📄',
      url:     '🌐',
      github:  '🐙',
      command: '📟',
      message: '💬',
    };

    function escText(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function removeCardEl(el) {
      if (!el || !el.isConnected) return;
      el.classList.remove('in');
      el.classList.add('out');
      setTimeout(() => { try { el.remove(); } catch (_) {} }, 320);
    }

    function trimCardStack() {
      const cards = cardsRoot.querySelectorAll('.card');
      for (let i = MAX_VISIBLE_CARDS; i < cards.length; i++) {
        removeCardEl(cards[i]);
      }
    }

    function renderCard(card) {
      // card: {id, type, title, subtitle, action_url, action_label}
      const type = (card.type || 'message').toLowerCase();
      const actionLabel = card.action_label || CARD_DEFAULT_ACTIONS[type] || null;
      const hasAction =
        (type === 'file'    && card.action_url)
     || (type === 'url'     && card.action_url)
     || (type === 'github'  && card.action_url)
     || (type === 'command');
      const emoji = CARD_EMOJI[type] || '💬';

      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.cardId = String(card.id);

      el.innerHTML = `
        <div class="card-top">
          <span class="card-emoji">${escText(emoji)}</span>
          <span class="card-title">${escText(card.title || '')}</span>
          <button class="card-close" aria-label="Dismiss">×</button>
        </div>
        ${
          hasAction || card.subtitle
            ? `<div class="card-bottom">
                 <span class="card-subtitle">${escText(card.subtitle || '')}</span>
                 ${hasAction && actionLabel
                   ? `<button class="card-action">${escText(actionLabel)}</button>`
                   : ''}
               </div>`
            : ''
        }
      `;

      let dismissTimer = null;
      function scheduleDismiss() {
        if (dismissTimer) clearTimeout(dismissTimer);
        dismissTimer = setTimeout(() => removeCardEl(el), CARD_TTL_MS);
      }
      function cancelDismiss() {
        if (dismissTimer) { clearTimeout(dismissTimer); dismissTimer = null; }
      }
      el.addEventListener('mouseenter', cancelDismiss);
      el.addEventListener('mouseleave', scheduleDismiss);

      el.querySelector('.card-close').addEventListener('click', (e) => {
        e.stopPropagation();
        removeCardEl(el);
      });

      const actionEl = el.querySelector('.card-action');
      if (actionEl) {
        actionEl.addEventListener('click', (e) => {
          e.stopPropagation();
          if (type === 'command') {
            const payload = card.subtitle || card.title || '';
            ipcRenderer.send('sparky-copy-text', payload);
          } else if (type === 'file' && card.action_url) {
            ipcRenderer.send('sparky-open-path', card.action_url);
          } else if (card.action_url) {
            ipcRenderer.send('sparky-open-url', card.action_url);
          }
        });
      }

      // Insert at the top of the stack (newest first).
      cardsRoot.insertBefore(el, cardsRoot.firstChild);
      void el.offsetWidth;  // reflow so transition fires
      el.classList.add('in');
      scheduleDismiss();
      trimCardStack();
    }

    let lastCardId = 0;
    function processCards(cards) {
      if (!Array.isArray(cards) || !cards.length) return;
      // Server sends recent cards in chronological order; filter to the
      // ones we haven't rendered yet (by monotonic id).
      const fresh = cards.filter(c => typeof c.id === 'number' && c.id > lastCardId);
      if (!fresh.length) return;
      fresh.sort((a, b) => a.id - b.id);
      for (const c of fresh) {
        renderCard(c);
        lastCardId = c.id;
      }
    }

    // ---------------- Mute ----------------
    let muted = false;

    function updateMuteIcon() {
      muteBtn.textContent = muted ? '🔇' : '🔊';
      muteBtn.title = muted ? 'Unmute Sparky' : 'Mute Sparky';
    }

    muteBtn.addEventListener('click', async () => {
      muted = !muted;
      updateMuteIcon();
      await httpPost(muted ? '/mute' : '/unmute');
    });

    // ---------------- Cursor tracking ----------------
    function setPupils(offsetX, offsetY) {
      try {
        const doc = sparkyObj.contentDocument;
        if (!doc) return;
        const lp = doc.getElementById('pupil-left');
        const rp = doc.getElementById('pupil-right');
        if (!lp || !rp) return;
        lp.setAttribute('cx', PUPIL_BASE_L.cx + offsetX);
        lp.setAttribute('cy', PUPIL_BASE_L.cy + offsetY);
        rp.setAttribute('cx', PUPIL_BASE_R.cx + offsetX);
        rp.setAttribute('cy', PUPIL_BASE_R.cy + offsetY);
      } catch (e) { /* SVG not ready yet */ }
    }

    ipcRenderer.on('cursor-pos', (event, payload) => {
      const { cursor, window: win } = payload || {};
      if (!cursor || !win) return;
      const sparkyCx = win.x + win.width - SPARKY_RIGHT_OFFSET;
      const sparkyCy = win.y + SPARKY_CY_OFFSET;
      const dx = cursor.x - sparkyCx;
      const dy = cursor.y - sparkyCy;
      const dist = Math.hypot(dx, dy);
      if (dist <= TRACKING_RADIUS) {
        lastActivity = Date.now();
        if (currentState === 'sleeping') setState('idle');
        const scale = Math.min(1, dist / TRACKING_RADIUS) * PUPIL_MAX_OFFSET;
        const norm = dist < 1 ? 1 : dist;
        setPupils((dx / norm) * scale, (dy / norm) * scale);
      } else {
        setPupils(0, 0);
      }
    });

    // ---------------- Click interactions ----------------
    function showContextMenu(x, y) {
      const maxX = Math.max(0, window.innerWidth - 150);
      const maxY = Math.max(0, window.innerHeight - 90);
      contextMenu.style.left = Math.min(x, maxX) + 'px';
      contextMenu.style.top = Math.min(y, maxY) + 'px';
      contextMenu.style.display = 'block';
    }
    function hideContextMenu() {
      contextMenu.style.display = 'none';
    }

    sparkyContainer.addEventListener('click', (e) => {
      if (e.button !== 0) return;
      if (contextMenu.style.display === 'block') { hideContextMenu(); return; }
      e.preventDefault();
      lastActivity = Date.now();
      body.classList.remove('state-happy');
      void body.offsetWidth;
      setState('happy');
      postStateHttp('happy');
    });

    sparkyContainer.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();
      lastActivity = Date.now();
      showContextMenu(e.clientX, e.clientY);
    });

    contextMenu.addEventListener('click', (e) => {
      const item = e.target.closest('.menu-item');
      if (!item) return;
      const action = item.dataset.action;
      hideContextMenu();
      if (action === 'hide') {
        ipcRenderer.send('sparky-hide');
      } else if (action === 'settings') {
        ipcRenderer.send('sparky-settings');
      } else if (action === 'whammy') {
        setState('whammy');
        postStateHttp('whammy', 'manual test');
      }
    });

    document.addEventListener('mousedown', (e) => {
      if (contextMenu.style.display !== 'block') return;
      if (!e.target.closest('#context-menu')) hideContextMenu();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideContextMenu();
    });

    // ---------------- Window drag ----------------
    let isDragging = false;
    document.body.addEventListener('pointerdown', (e) => {
      if (e.target.closest('#sparky-container')) return;
      if (e.target.closest('#context-menu')) return;
      if (e.target.closest('.card')) return;
      if (e.target.closest('#mute-btn')) return;
      isDragging = true;
      document.body.setPointerCapture(e.pointerId);
      ipcRenderer.send('sparky-drag-start', { screenX: e.screenX, screenY: e.screenY });
    });
    document.body.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      ipcRenderer.send('sparky-drag-move', { screenX: e.screenX, screenY: e.screenY });
    });
    document.body.addEventListener('pointerup', () => {
      isDragging = false;
      ipcRenderer.send('sparky-drag-end');
    });

    // ---------------- Polling ----------------
    let lastBubbleId = 0;

    async function pollState() {
      try {
        const response = await fetch('http://localhost:11437/state');
        if (!response.ok) return;
        const data = await response.json();
        if (data.state && data.state !== currentState) setState(data.state);
        const b = data.bubble;
        if (b && typeof b.id === 'number' && b.id > lastBubbleId && b.text) {
          lastBubbleId = b.id;
          showBubble(b.text);
        }
        processCards(data.cards);
        if (typeof data.muted === 'boolean' && data.muted !== muted) {
          muted = data.muted;
          updateMuteIcon();
        }
      } catch (e) { /* bridge down; ignore */ }
    }

    function checkIdle() {
      const idleTime = Date.now() - lastActivity;
      if (idleTime > 5 * 60 * 1000 && currentState !== 'sleeping') {
        setState('sleeping');
      }
    }

    ipcRenderer.on('state-update', (event, state) => setState(state));

    updateMuteIcon();
    setInterval(pollState, 500);
    setInterval(checkIdle, 30000);

    setState('idle');
  </script>
</body>
</html>
