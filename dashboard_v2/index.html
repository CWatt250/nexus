<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#E0E7FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nexus">

<link rel="apple-touch-icon" href="/icon-192.svg">
<link rel="icon" href="/icon-192.svg" type="image/svg+xml">
<title>Nexus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/framer-motion@10.18.0/dist/framer-motion.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root { color-scheme: light; }
  html, body {
    min-height: 100vh; min-height: 100dvh;
    background: #EEF1FF;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter",
                 system-ui, sans-serif;
    color: #1A1F4F;
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }

  /* iOS 26 Liquid Glass — light pastel aurora that drifts. */
  .bg-liquid {
    background:
      radial-gradient(ellipse 1200px 900px at 10% 5%,  rgba(224,231,255,0.95), transparent 60%),
      radial-gradient(ellipse 1100px 800px at 95% 30%, rgba(245,224,255,0.95), transparent 60%),
      radial-gradient(ellipse 900px  700px at 80% 95%, rgba(255,224,240,0.95), transparent 65%),
      radial-gradient(ellipse 1000px 800px at 5%  95%, rgba(224,242,255,0.85), transparent 65%),
      linear-gradient(135deg, #E0E7FF 0%, #F5E0FF 50%, #FFE0F0 100%);
    background-attachment: fixed;
    background-size: 200% 200%;
    animation: liquid-drift 28s ease-in-out infinite alternate;
  }
  @keyframes liquid-drift {
    0%   { background-position:   0%   0%,   100% 0%,   100% 100%, 0%   100%, 0% 0%; }
    50%  { background-position:  20%  10%,    80% 20%,    90%  85%, 10%   85%, 50% 50%; }
    100% { background-position:  35%  25%,    65% 35%,    70%  70%, 25%   70%, 100% 100%; }
  }

  /* The signature surface — translucent white with heavy backdrop blur. */
  .glass {
    background: rgba(255,255,255,0.60);
    border: 1px solid rgba(255,255,255,0.80);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 22px;
    box-shadow:
      0 8px 32px rgba(31,38,135,0.15),
      inset 0 1px 0 rgba(255,255,255,0.95);
  }
  .glass-strong {
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(255,255,255,0.90);
    backdrop-filter: blur(48px) saturate(200%);
    -webkit-backdrop-filter: blur(48px) saturate(200%);
    border-radius: 26px;
    box-shadow:
      0 12px 40px rgba(31,38,135,0.18),
      inset 0 1px 0 rgba(255,255,255,1);
  }
  .glass-tinted-blue {
    background: linear-gradient(135deg, rgba(0,122,255,0.18), rgba(175,82,222,0.10));
    border: 1px solid rgba(255,255,255,0.85);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 22px;
    box-shadow: 0 8px 32px rgba(0,122,255,0.18), inset 0 1px 0 rgba(255,255,255,0.95);
  }

  /* Inputs — frosted, no harsh borders. */
  .glass-input {
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(255,255,255,0.90);
    border-radius: 16px;
    color: #1A1F4F;
    padding: 12px 16px;
    transition: all 0.2s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .glass-input::placeholder { color: rgba(26,31,79,0.45); }
  .glass-input:focus {
    outline: none;
    border-color: rgba(0,122,255,0.5);
    background: rgba(255,255,255,0.80);
    box-shadow: 0 0 0 4px rgba(0,122,255,0.10);
  }

  /* iOS-blue primary action button. */
  .btn-primary {
    background: linear-gradient(180deg, #0A84FF 0%, #007AFF 100%);
    color: white;
    border-radius: 16px;
    padding: 12px 20px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,122,255,0.35);
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
  }
  .btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,122,255,0.25); }
  .btn-primary:disabled { opacity: 0.4; box-shadow: none; }

  .btn-pill {
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(255,255,255,0.95);
    border-radius: 999px;
    padding: 8px 16px;
    color: #1A1F4F;
    font-size: 13px;
    font-weight: 500;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 2px 8px rgba(31,38,135,0.10);
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .btn-pill:active { transform: scale(0.94); }

  /* Card mount — iOS spring entrance. */
  .reveal { animation: reveal 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Pulse ring for "active" indicators. */
  .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0    rgba(52,199,89,0.55); }
    70%  { box-shadow: 0 0 0 14px rgba(52,199,89,0);    }
    100% { box-shadow: 0 0 0 0    rgba(52,199,89,0);    }
  }
  .pulse-amber { animation: pulse-amber 1.6s ease-out infinite; }
  @keyframes pulse-amber {
    0%   { box-shadow: 0 0 0 0    rgba(255,159,10,0.55); }
    70%  { box-shadow: 0 0 0 14px rgba(255,159,10,0);    }
    100% { box-shadow: 0 0 0 0    rgba(255,159,10,0);    }
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-green { background: #34C759; }
  .dot-amber { background: #FF9F0A; }
  .dot-red   { background: #FF3B30; }
  .dot-grey  { background: #8E8E93; }

  .text-secondary { color: rgba(26,31,79,0.62); }
  .text-tertiary  { color: rgba(26,31,79,0.45); }

  .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 8px); }
  .safe-top    { padding-top:    max(env(safe-area-inset-top), 8px); }

  .scroll-clean::-webkit-scrollbar { width: 6px; }
  .scroll-clean::-webkit-scrollbar-thumb { background: rgba(26,31,79,0.15); border-radius: 3px; }

  /* Tap scale for any pressable surface. */
  .tap { transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .tap:active { transform: scale(0.97); }

  /* Bottom tab — iOS frosted bar. */
  .tabbar {
    background: rgba(255,255,255,0.70);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 1px solid rgba(255,255,255,0.95);
    box-shadow: 0 -4px 24px rgba(31,38,135,0.10);
  }
  .tab-icon-active { color: #007AFF; }
  .tab-icon-idle   { color: rgba(26,31,79,0.50); }

  /* Chat bubbles. */
  .bubble-me {
    background: linear-gradient(180deg, #0A84FF 0%, #007AFF 100%);
    color: white;
    border-radius: 20px 20px 4px 20px;
    box-shadow: 0 4px 14px rgba(0,122,255,0.30);
  }
  .bubble-them {
    background: rgba(255,255,255,0.85);
    color: #1A1F4F;
    border-radius: 20px 20px 20px 4px;
    border: 1px solid rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
</style>
</head>
<body class="bg-liquid">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useEffect, useState, useRef, useCallback, useMemo } = React;
const FM = window["framer-motion"] || window.FramerMotion || window.Motion || {};
const motion = FM.motion || new Proxy({}, { get: (_, tag) => (props) => React.createElement(tag, props) });
const AnimatePresence = FM.AnimatePresence || (({children}) => children);

// Spring presets matching iOS feel.
const spring = { type: "spring", stiffness: 380, damping: 28, mass: 0.9 };
const springSoft = { type: "spring", stiffness: 220, damping: 24 };

// ── tiny client helpers ─────────────────────────────────────────────────
const API = (window.location.protocol + "//" + window.location.hostname + ":11435");
async function get(path) {
  const r = await fetch(API + path); return r.json();
}
async function post(path, body) {
  const r = await fetch(API + path, {
    method: "POST", headers: {"content-type": "application/json"},
    body: JSON.stringify(body || {}),
  });
  return r.json();
}

const fmtDur = (s) => {
  if (!s && s !== 0) return "—";
  if (s < 60)   return `${s.toFixed(1)}s`;
  if (s < 3600) return `${(s/60).toFixed(1)}m`;
  return `${(s/3600).toFixed(1)}h`;
};
const fmtTimeAgo = (mtime) => fmtDur((Date.now()/1000) - mtime) + " ago";
const statusDot = (state) => {
  if (state === "active" || state === "done") return "dot-green";
  if (state === "running" || state === "activating") return "dot-amber";
  if (state === "failed" || state === "timeout" || state === "inactive") return "dot-red";
  return "dot-grey";
};

// ── SF-Symbol-style inline icons ────────────────────────────────────────
const Icon = ({ name, size = 24, color = "currentColor", strokeWidth = 2 }) => {
  const paths = {
    home:    <><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v10h14V10"/></>,
    send:    <><path d="M3 12L21 4l-8 18-2-8-8-2z"/></>,
    brain:   <><path d="M9.5 3a3.5 3.5 0 0 0-3.5 3.5c0 .75.24 1.45.65 2.02A3.5 3.5 0 0 0 4 12c0 .92.36 1.76.94 2.39A3.5 3.5 0 0 0 8 20a3.5 3.5 0 0 0 4-1V4a3.5 3.5 0 0 0-2.5-1z"/><path d="M14.5 3A3.5 3.5 0 0 1 18 6.5c0 .75-.24 1.45-.65 2.02A3.5 3.5 0 0 1 20 12c0 .92-.36 1.76-.94 2.39A3.5 3.5 0 0 1 16 20a3.5 3.5 0 0 1-4-1"/></>,
    gear:    <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.57V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.57 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.57-1.04H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.57-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.57V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.04 1.57 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.57 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1z"/></>,
    bolt:    <><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></>,
    sparkle: <><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></>,
    chevron: <><path d="M9 6l6 6-6 6"/></>,
    check:   <><path d="M5 12l5 5L20 7"/></>,
    x:       <><path d="M6 6l12 12M18 6L6 18"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
         stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
};

// ── live WebSocket subscription ─────────────────────────────────────────
function useEvents() {
  const [events, setEvents] = useState([]);
  const [connected, setConnected] = useState(false);
  useEffect(() => {
    let ws, retry, alive = true;
    const connect = () => {
      try {
        ws = new WebSocket(API.replace(/^http/, "ws") + "/ws/events");
      } catch { setConnected(false); return; }
      ws.onopen = () => alive && setConnected(true);
      ws.onclose = () => {
        if (!alive) return;
        setConnected(false);
        retry = setTimeout(connect, 3000);
      };
      ws.onerror = () => ws && ws.close();
      ws.onmessage = (m) => {
        try {
          const ev = JSON.parse(m.data);
          setEvents((evs) => [ev, ...evs].slice(0, 200));
        } catch {}
      };
    };
    connect();
    return () => { alive = false; clearTimeout(retry); ws && ws.close(); };
  }, []);
  return { events, connected };
}

// ── Header ──────────────────────────────────────────────────────────────
function Header({ tab, connected }) {
  const titles = { home: "Nexus", dispatch: "Dispatch", memory: "Memory", settings: "Settings" };
  return (
    <div className="safe-top px-5 pt-4 pb-3 flex items-center justify-between">
      <h1 className="text-3xl font-bold tracking-tight" style={{letterSpacing: "-0.02em"}}>
        {titles[tab]}
      </h1>
      <div className="flex items-center gap-2 text-xs text-secondary">
        <span className={"dot " + (connected ? "dot-green" : "dot-red") + (connected ? " pulse-ring" : "")}></span>
        <span className="font-medium">{connected ? "Live" : "Offline"}</span>
      </div>
    </div>
  );
}

// ── Bottom tab bar ──────────────────────────────────────────────────────
function BottomNav({ tab, setTab }) {
  const items = [
    { id: "home",     label: "Home",     icon: "home"    },
    { id: "dispatch", label: "Dispatch", icon: "send"    },
    { id: "memory",   label: "Memory",   icon: "brain"   },
    { id: "settings", label: "Settings", icon: "gear"    },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 safe-bottom px-3 pb-2 pt-2 z-30">
      <div className="tabbar mx-auto max-w-2xl flex justify-around p-1.5 rounded-3xl">
        {items.map((it) => {
          const active = tab === it.id;
          return (
            <motion.button
              key={it.id}
              onClick={() => setTab(it.id)}
              whileTap={{ scale: 0.9 }}
              transition={spring}
              className="flex-1 flex flex-col items-center justify-center py-2 px-1 rounded-2xl tap"
              style={{
                background: active ? "rgba(0,122,255,0.10)" : "transparent",
              }}
            >
              <span className={active ? "tab-icon-active" : "tab-icon-idle"}>
                <Icon name={it.icon} size={24} strokeWidth={active ? 2.4 : 1.8} />
              </span>
              <span className={"text-[10px] mt-0.5 font-medium " + (active ? "tab-icon-active" : "tab-icon-idle")}>
                {it.label}
              </span>
            </motion.button>
          );
        })}
      </div>
    </div>
  );
}

// ── HOME ────────────────────────────────────────────────────────────────
function ChatBox() {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs]);

  const onSend = async () => {
    const text = input.trim();
    if (!text || busy) return;
    setMsgs((m) => [...m, { role: "user", content: text }]);
    setInput(""); setBusy(true);
    try {
      const r = await post("/chat", { message: text });
      setMsgs((m) => [...m, { role: "assistant", content: r.response || "(no reply)" }]);
    } catch (e) {
      setMsgs((m) => [...m, { role: "assistant", content: "Error: " + e.message }]);
    } finally { setBusy(false); }
  };

  return (
    <motion.div
      initial={{ opacity: 0, y: 12, scale: 0.97 }}
      animate={{ opacity: 1, y: 0, scale: 1 }}
      transition={spring}
      className="glass-strong p-4"
    >
      <div className="flex items-center gap-2 mb-3">
        <Icon name="sparkle" size={18} color="#AF52DE" />
        <span className="text-sm font-semibold" style={{color: "#1A1F4F"}}>Ask Nexus</span>
      </div>

      <div ref={scrollRef} className="scroll-clean overflow-y-auto pr-1 mb-3 space-y-2"
           style={{maxHeight: msgs.length ? "32vh" : "0", transition: "max-height 0.3s"}}>
        <AnimatePresence>
          {msgs.map((m, i) => (
            <motion.div
              key={i}
              initial={{ opacity: 0, y: 8, scale: 0.96 }}
              animate={{ opacity: 1, y: 0, scale: 1 }}
              transition={spring}
              className={"flex " + (m.role === "user" ? "justify-end" : "justify-start")}
            >
              <div className={"max-w-[82%] px-4 py-2.5 text-[14px] leading-snug " + (m.role === "user" ? "bubble-me" : "bubble-them")}>
                {m.content}
              </div>
            </motion.div>
          ))}
        </AnimatePresence>
      </div>

      <div className="flex gap-2 items-center">
        <input
          className="glass-input flex-1 text-[15px]"
          placeholder={busy ? "thinking…" : "iMessage Nexus"}
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && !e.shiftKey && onSend()}
          disabled={busy}
        />
        <motion.button
          whileTap={{ scale: 0.92 }}
          transition={spring}
          onClick={onSend}
          disabled={busy || !input.trim()}
          className="btn-primary flex items-center justify-center"
          style={{ width: 44, height: 44, padding: 0, borderRadius: 22 }}
          aria-label="Send"
        >
          <Icon name="send" size={18} color="white" strokeWidth={2.4} />
        </motion.button>
      </div>
    </motion.div>
  );
}

function ActiveNow({ snap }) {
  const r = snap && snap.queue && snap.queue.running;
  if (!r) {
    return (
      <motion.div
        initial={{ opacity: 0, y: 12, scale: 0.97 }}
        animate={{ opacity: 1, y: 0, scale: 1 }}
        transition={{ ...spring, delay: 0.05 }}
        className="glass p-5"
      >
        <div className="flex items-center gap-2 mb-1">
          <span className="dot dot-green pulse-ring"></span>
          <div className="text-xs uppercase tracking-wider text-secondary font-semibold">Status</div>
        </div>
        <div className="text-lg font-semibold mt-1">All clear</div>
        <div className="text-sm text-secondary mt-0.5">Nothing dispatched right now. Tap Dispatch to send Claude Code on a task.</div>
      </motion.div>
    );
  }
  return (
    <motion.div
      initial={{ opacity: 0, y: 12, scale: 0.97 }}
      animate={{ opacity: 1, y: 0, scale: 1 }}
      transition={{ ...spring, delay: 0.05 }}
      className="glass-tinted-blue p-5"
    >
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2">
          <span className="dot dot-amber pulse-amber"></span>
          <div className="text-xs uppercase tracking-wider font-semibold" style={{color: "#007AFF"}}>Active now</div>
        </div>
        <span className="text-xs text-secondary font-medium">{fmtDur(r.elapsed_seconds)}</span>
      </div>
      <div className="text-lg font-semibold font-mono mt-1" style={{color: "#1A1F4F"}}>{r.dispatch_id}</div>
      {r.label && <div className="text-sm text-secondary mt-0.5">{r.label}</div>}
      <div className="mt-4 h-1.5 rounded-full bg-white/60 overflow-hidden">
        <motion.div
          initial={{ width: 0 }}
          animate={{ width: ["0%", "75%", "45%", "92%"] }}
          transition={{ duration: 6, repeat: Infinity, ease: "easeInOut" }}
          className="h-full rounded-full"
          style={{ background: "linear-gradient(90deg, #007AFF 0%, #AF52DE 100%)" }}
        />
      </div>
    </motion.div>
  );
}

function ActivityCard({ ev, idx }) {
  const eventName = (ev.event || "").replace(/_/g, " ");
  const accent = ev.event && ev.event.includes("error") ? "#FF3B30"
               : ev.event && ev.event.includes("complete") ? "#34C759"
               : ev.event && ev.event.includes("dispatch") ? "#007AFF"
               : "#AF52DE";
  return (
    <motion.div
      initial={{ opacity: 0, y: 8, scale: 0.97 }}
      animate={{ opacity: 1, y: 0, scale: 1 }}
      transition={{ ...spring, delay: Math.min(idx * 0.02, 0.2) }}
      className="glass p-3 flex items-center gap-3"
    >
      <div style={{
        width: 36, height: 36, borderRadius: 18,
        background: `linear-gradient(135deg, ${accent}30, ${accent}15)`,
        border: `1px solid ${accent}40`,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
      }}>
        <span style={{ width: 8, height: 8, borderRadius: 4, background: accent, display: "block" }}></span>
      </div>
      <div className="flex-1 min-w-0">
        <div className="text-[13px] font-semibold capitalize truncate" style={{color: "#1A1F4F"}}>{eventName}</div>
        <div className="text-[12px] text-secondary truncate">
          {ev.label || ev.dispatch_id || ev.task_id || ev.tool || "—"}
        </div>
      </div>
    </motion.div>
  );
}

function ActivityFeed({ events }) {
  if (!events.length) return (
    <motion.div
      initial={{ opacity: 0, y: 12 }} animate={{ opacity: 1, y: 0 }} transition={spring}
      className="glass p-5 text-sm text-secondary text-center"
    >
      <Icon name="sparkle" size={20} color="#AF52DE" />
      <div className="mt-2">Waiting for events. Tools and tasks will stream here as they fire.</div>
    </motion.div>
  );
  return (
    <div className="space-y-2">
      <div className="px-2 text-xs uppercase tracking-wider text-secondary font-semibold">Recent activity</div>
      <div className="space-y-2 scroll-clean overflow-y-auto pr-1" style={{maxHeight: "44vh"}}>
        {events.slice(0, 30).map((ev, i) => <ActivityCard key={i} ev={ev} idx={i} />)}
      </div>
    </div>
  );
}

function HomeTab({ events, snap }) {
  return (
    <div className="px-4 space-y-4 pb-32">
      <ChatBox />
      <ActiveNow snap={snap} />
      <ActivityFeed events={events} />
    </div>
  );
}

// ── DISPATCH ────────────────────────────────────────────────────────────
const TEMPLATES = [
  { label: "Build a feature", text: "Build [feature]. Include tests. Commit." },
  { label: "Fix a bug",       text: "Fix [bug description]. Reproduce with a test, then make it pass." },
  { label: "Write tests",     text: "Add unit tests for [target]. Aim for 80%+ coverage." },
  { label: "Refactor",        text: "Refactor [target] for readability. Don't change behavior. Tests must still pass." },
];

function DispatchTab({ snap, refresh }) {
  const [prompt, setPrompt] = useState("");
  const [label, setLabel] = useState("");
  const [budget, setBudget] = useState(120);
  const [busy, setBusy] = useState(false);
  const [feedback, setFeedback] = useState("");

  const submit = async (force = false) => {
    if (!prompt.trim() || busy) return;
    setBusy(true); setFeedback("");
    try {
      const r = await post("/api/dispatch", { prompt, label, time_budget_minutes: budget, force });
      if (r.ok) {
        setFeedback((r.pending_approval ? "Held for approval — " : "Dispatched — ") + r.dispatch_id);
        setPrompt(""); setLabel("");
        refresh();
      } else {
        setFeedback("⚠️ " + (r.error || "failed"));
      }
    } catch (e) { setFeedback("⚠️ " + e.message); }
    finally { setBusy(false); }
  };

  const runningId = snap && snap.queue && snap.queue.running ? snap.queue.running.dispatch_id : null;
  const queued    = (snap && snap.queue && snap.queue.queued) || [];
  const pending   = (snap && snap.queue && snap.queue.pending_approval) || [];
  const recent    = (snap && snap.recent) || [];
  const budgetInfo = (snap && snap.budget) || {};

  const budgetDot = budgetInfo.level === "over" ? "dot-red"
                  : budgetInfo.level && budgetInfo.level.startsWith("warn") ? "dot-amber"
                  : "dot-green";

  return (
    <div className="px-4 space-y-4 pb-32">
      <motion.div
        initial={{ opacity: 0, y: 12, scale: 0.97 }}
        animate={{ opacity: 1, y: 0, scale: 1 }}
        transition={spring}
        className="glass-strong p-4"
      >
        <div className="flex items-center gap-2 mb-3">
          <Icon name="bolt" size={18} color="#AF52DE" />
          <span className="text-sm font-semibold">New dispatch</span>
        </div>
        <textarea
          className="glass-input w-full text-[14px] font-mono"
          rows={5}
          placeholder="Describe what Claude Code should build, fix, or refactor…"
          value={prompt}
          onChange={(e) => setPrompt(e.target.value)}
        />
        <div className="flex flex-wrap gap-2 mt-3">
          {TEMPLATES.map((t) => (
            <motion.button
              key={t.label}
              whileTap={{ scale: 0.93 }}
              transition={spring}
              onClick={() => setPrompt(t.text)}
              className="btn-pill"
            >
              {t.label}
            </motion.button>
          ))}
        </div>
        <div className="grid grid-cols-2 gap-2 mt-3">
          <input className="glass-input text-[14px]" placeholder="label (optional)"
                 value={label} onChange={(e) => setLabel(e.target.value)} />
          <input className="glass-input text-[14px]" type="number" min="5" max="480"
                 value={budget} onChange={(e) => setBudget(parseInt(e.target.value) || 120)}
                 placeholder="budget (min)" />
        </div>
        <div className="flex justify-between items-center mt-4">
          <div className="text-xs text-secondary flex items-center gap-2">
            <span className={"dot " + budgetDot}></span>
            <span className="font-medium">${(budgetInfo.spend || 0).toFixed(2)} / ${(budgetInfo.monthly_budget || 50).toFixed(0)}</span>
          </div>
          <div className="flex gap-2">
            <motion.button
              whileTap={{ scale: 0.94 }}
              transition={spring}
              onClick={() => submit(false)} disabled={busy || !prompt.trim()}
              className="btn-primary text-[14px]"
            >
              Dispatch
            </motion.button>
            {budgetInfo.level === "over" && (
              <motion.button
                whileTap={{ scale: 0.94 }}
                transition={spring}
                onClick={() => submit(true)} disabled={busy}
                className="btn-pill"
                style={{background: "rgba(255,59,48,0.12)", color: "#FF3B30", borderColor: "rgba(255,59,48,0.25)"}}
              >
                Force
              </motion.button>
            )}
          </div>
        </div>
        {feedback && <div className="mt-3 text-[13px] font-medium" style={{color: "#007AFF"}}>{feedback}</div>}
      </motion.div>

      <AnimatePresence>
        {pending.length > 0 && (
          <motion.div
            initial={{ opacity: 0, y: 12, scale: 0.97 }}
            animate={{ opacity: 1, y: 0, scale: 1 }}
            exit={{ opacity: 0, scale: 0.97 }}
            transition={spring}
            className="glass p-4"
            style={{ background: "rgba(255,159,10,0.10)", borderColor: "rgba(255,159,10,0.30)" }}
          >
            <div className="text-xs uppercase tracking-wider font-semibold mb-2" style={{color: "#FF9F0A"}}>
              Pending approval ({pending.length})
            </div>
            {pending.map((p) => (
              <DispatchCard key={p.dispatch_id} item={{...p, _pending: true}} refresh={refresh} />
            ))}
          </motion.div>
        )}
      </AnimatePresence>

      {runningId && (
        <motion.div
          initial={{ opacity: 0, y: 12, scale: 0.97 }}
          animate={{ opacity: 1, y: 0, scale: 1 }}
          transition={spring}
          className="glass-tinted-blue p-4"
        >
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <span className="dot dot-amber pulse-amber"></span>
              <div className="text-xs uppercase tracking-wider font-semibold" style={{color: "#007AFF"}}>Running</div>
            </div>
            <span className="text-xs text-secondary font-medium">{fmtDur(snap.queue.running.elapsed_seconds)}</span>
          </div>
          <div className="text-[15px] font-semibold font-mono mt-1">{runningId}</div>
        </motion.div>
      )}

      {queued.length > 0 && (
        <motion.div
          initial={{ opacity: 0, y: 12 }} animate={{ opacity: 1, y: 0 }} transition={spring}
          className="glass p-4"
        >
          <div className="text-xs uppercase tracking-wider text-secondary font-semibold mb-2">Queued ({queued.length})</div>
          <div className="space-y-2">
            {queued.map((q, i) => (
              <div key={q.dispatch_id} className="flex justify-between items-center text-[13px] py-1">
                <span className="font-mono">{q.dispatch_id}</span>
                <span className="text-tertiary text-xs">#{i + 1}</span>
              </div>
            ))}
          </div>
        </motion.div>
      )}

      <div className="space-y-2">
        <div className="px-2 text-xs uppercase tracking-wider text-secondary font-semibold">Recent</div>
        {recent.length === 0
          ? <div className="glass p-5 text-secondary text-sm text-center">No dispatches yet.</div>
          : <div className="space-y-2">
              {recent.slice(0, 10).map((r, i) => (
                <motion.div
                  key={r.dispatch_id}
                  initial={{ opacity: 0, y: 8, scale: 0.97 }}
                  animate={{ opacity: 1, y: 0, scale: 1 }}
                  transition={{ ...spring, delay: Math.min(i * 0.03, 0.25) }}
                >
                  <DispatchCard item={r} refresh={refresh} />
                </motion.div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

function DispatchCard({ item, refresh }) {
  const [open, setOpen] = useState(false);
  const [logText, setLogText] = useState("");
  useEffect(() => {
    if (open && item.dispatch_id && !item._pending) {
      get(`/api/dispatch/${item.dispatch_id}/log?tail=80`).then((r) => setLogText(r.log || ""));
    }
  }, [open, item.dispatch_id, item._pending]);

  if (item._pending) {
    return (
      <div className="py-2 flex items-center justify-between gap-2">
        <span className="font-mono text-[13px]">{item.dispatch_id}</span>
        <div className="flex gap-2">
          <motion.button whileTap={{scale: 0.92}} transition={spring}
            onClick={async () => { await post("/api/dispatch/approve", {dispatch_id: item.dispatch_id}); refresh(); }}
            className="btn-pill" style={{background: "rgba(52,199,89,0.15)", color: "#34C759", borderColor: "rgba(52,199,89,0.30)"}}>
            <Icon name="check" size={14} strokeWidth={2.5} />
          </motion.button>
          <motion.button whileTap={{scale: 0.92}} transition={spring}
            onClick={async () => { await post("/api/dispatch/cancel",  {dispatch_id: item.dispatch_id}); refresh(); }}
            className="btn-pill" style={{background: "rgba(255,59,48,0.12)", color: "#FF3B30", borderColor: "rgba(255,59,48,0.25)"}}>
            <Icon name="x" size={14} strokeWidth={2.5} />
          </motion.button>
        </div>
      </div>
    );
  }

  const dotCls = statusDot(item.status);
  return (
    <motion.div
      whileTap={{ scale: 0.99 }}
      transition={spring}
      className="glass p-3 cursor-pointer"
      onClick={() => setOpen(!open)}
    >
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2 min-w-0">
          <span className={"dot " + dotCls}></span>
          <span className="font-mono text-[13px] truncate">{item.dispatch_id}</span>
        </div>
        <div className="text-xs text-secondary flex gap-3 items-center font-medium">
          <span>{item.status}</span>
          <span>{fmtDur(item.duration_seconds)}</span>
        </div>
      </div>
      <AnimatePresence>
        {open && (
          <motion.div
            initial={{ opacity: 0, height: 0 }}
            animate={{ opacity: 1, height: "auto" }}
            exit={{ opacity: 0, height: 0 }}
            transition={springSoft}
            className="overflow-hidden"
          >
            <div className="mt-3 ml-4 space-y-1 text-xs">
              {item.one_line_summary && <div className="text-[13px]" style={{color: "#1A1F4F"}}>{item.one_line_summary}</div>}
              {item.commits_made && item.commits_made.length > 0 && (
                <div className="text-secondary">{item.commits_made.length} commits: {item.commits_made.slice(0, 3).join(", ")}</div>
              )}
              {item.files_changed > 0 && <div className="text-secondary">files changed: {item.files_changed}</div>}
              {item.error_tail && <div style={{color: "#FF3B30"}}>err: {item.error_tail}</div>}
              {logText && (
                <pre className="mt-2 max-h-48 overflow-auto p-3 rounded-xl text-[10px] leading-tight scroll-clean"
                     style={{background: "rgba(26,31,79,0.05)", color: "#1A1F4F"}}>{logText}</pre>
              )}
            </div>
          </motion.div>
        )}
      </AnimatePresence>
    </motion.div>
  );
}

// ── MEMORY ──────────────────────────────────────────────────────────────
function MemoryTab() {
  const [retros, setRetros] = useState([]);
  const [wiki, setWiki] = useState([]);
  const [open, setOpen] = useState(null);
  const [body, setBody] = useState("");
  const [wikiQ, setWikiQ] = useState("");
  const [wikiHits, setWikiHits] = useState("");
  const [wikiSearching, setWikiSearching] = useState(false);

  const refresh = useCallback(() => {
    get("/api/memory/retros?limit=20").then((r) => setRetros(r.retros || []));
    get("/api/wiki/recent?limit=20").then((r) => setWiki(r.entries || []));
  }, []);
  useEffect(() => { refresh(); }, [refresh]);
  useEffect(() => {
    if (open && open.startsWith("retro_")) {
      get(`/api/memory/retro/${open}`).then((r) => setBody(r.body || ""));
    } else {
      setBody("");
    }
  }, [open]);

  const runSearch = async () => {
    if (!wikiQ.trim()) { setWikiHits(""); return; }
    setWikiSearching(true);
    try {
      const r = await get(`/api/wiki/search?q=${encodeURIComponent(wikiQ.trim())}&k=5`);
      setWikiHits(r.hits || "(no hits)");
    } catch (e) {
      setWikiHits(`error: ${e.message || e}`);
    } finally {
      setWikiSearching(false);
    }
  };

  const layerColor = (layer) => {
    if (layer === "entities") return "#0EA5E9";
    if (layer === "concepts") return "#FACC15";
    if (layer === "decisions") return "#A855F7";
    return "#1A1F4F";
  };

  return (
    <div className="px-4 space-y-4 pb-32">
      {/* Wiki search */}
      <div className="glass p-4 space-y-3">
        <div className="text-xs uppercase tracking-wider text-secondary font-semibold">Wiki search</div>
        <div className="flex gap-2">
          <input
            type="text"
            value={wikiQ}
            onChange={(e) => setWikiQ(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && runSearch()}
            placeholder="ask the wiki — bidwatt, dispatch, intent…"
            className="flex-1 px-3 py-2 rounded-xl text-sm outline-none"
            style={{background: "rgba(26,31,79,0.06)", color: "#1A1F4F"}}
          />
          <button
            onClick={runSearch}
            disabled={wikiSearching}
            className="px-4 py-2 rounded-xl text-sm font-semibold text-white disabled:opacity-50"
            style={{background: "#0EA5E9"}}
          >
            {wikiSearching ? "…" : "Search"}
          </button>
        </div>
        {wikiHits && (
          <pre className="p-3 rounded-xl text-[11px] leading-snug whitespace-pre-wrap scroll-clean overflow-auto"
               style={{background: "rgba(26,31,79,0.05)", maxHeight: "40vh", color: "#1A1F4F"}}>{wikiHits}</pre>
        )}
      </div>

      {/* Recent wiki entries */}
      <div className="px-2 text-xs uppercase tracking-wider text-secondary font-semibold">
        Recent wiki ({wiki.length})
      </div>
      {wiki.length === 0 && (
        <div className="glass p-5 text-secondary text-sm text-center">No wiki entries yet.</div>
      )}
      <div className="space-y-2">
        {wiki.map((w, i) => (
          <motion.div
            key={w.id}
            initial={{ opacity: 0, y: 8, scale: 0.97 }}
            animate={{ opacity: 1, y: 0, scale: 1 }}
            transition={{ ...spring, delay: Math.min(i * 0.02, 0.2) }}
            whileTap={{ scale: 0.99 }}
            className="glass p-4"
          >
            <div className="flex justify-between items-start gap-2">
              <div className="flex items-center gap-2 min-w-0">
                <span className="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-md text-white shrink-0"
                      style={{background: layerColor(w.layer)}}>{w.layer}</span>
                <span className="font-mono text-[13px] font-semibold truncate">{w.name}</span>
              </div>
              <span className="text-xs text-tertiary font-medium shrink-0">{w.last_updated || fmtTimeAgo(w.mtime)}</span>
            </div>
            <div className="text-[13px] text-secondary mt-1.5 line-clamp-2">{w.description || w.id}</div>
            {w.tags && w.tags.length > 0 && (
              <div className="flex flex-wrap gap-1 mt-2">
                {w.tags.slice(0, 5).map((t) => (
                  <span key={t} className="text-[10px] px-2 py-0.5 rounded-md font-medium"
                        style={{background: "rgba(26,31,79,0.08)", color: "#1A1F4F"}}>{t}</span>
                ))}
              </div>
            )}
          </motion.div>
        ))}
      </div>

      {/* Recent retros */}
      <div className="px-2 text-xs uppercase tracking-wider text-secondary font-semibold pt-2">
        Recent retros ({retros.length})
      </div>
      {retros.length === 0 && (
        <div className="glass p-5 text-secondary text-sm text-center">No retros yet.</div>
      )}
      <div className="space-y-2">
        {retros.map((r, i) => (
          <motion.div
            key={r.id}
            initial={{ opacity: 0, y: 8, scale: 0.97 }}
            animate={{ opacity: 1, y: 0, scale: 1 }}
            transition={{ ...spring, delay: Math.min(i * 0.02, 0.2) }}
            whileTap={{ scale: 0.99 }}
            className="glass p-4 cursor-pointer"
            onClick={() => setOpen(open === r.id ? null : r.id)}
          >
            <div className="flex justify-between items-center">
              <span className="font-mono text-[13px] font-semibold">{r.id}</span>
              <span className="text-xs text-tertiary font-medium">{fmtTimeAgo(r.mtime)}</span>
            </div>
            <div className="text-[13px] text-secondary mt-1.5 line-clamp-2">{r.preview}</div>
            <AnimatePresence>
              {open === r.id && body && (
                <motion.div
                  initial={{ opacity: 0, height: 0 }}
                  animate={{ opacity: 1, height: "auto" }}
                  exit={{ opacity: 0, height: 0 }}
                  transition={springSoft}
                  className="overflow-hidden"
                >
                  <pre className="mt-3 p-3 rounded-xl text-[11px] leading-snug whitespace-pre-wrap scroll-clean overflow-auto"
                       style={{background: "rgba(26,31,79,0.05)", maxHeight: "55vh", color: "#1A1F4F"}}>{body}</pre>
                </motion.div>
              )}
            </AnimatePresence>
          </motion.div>
        ))}
      </div>
    </div>
  );
}

// ── SETTINGS ────────────────────────────────────────────────────────────
function SettingsTab({ snap, refresh }) {
  const [services, setServices] = useState([]);
  const [restarting, setRestarting] = useState(null);
  const loadServices = useCallback(() => get("/api/services").then((r) => setServices(r.services || [])), []);
  useEffect(() => { loadServices(); const t = setInterval(loadServices, 10000); return () => clearInterval(t); }, [loadServices]);

  const restart = async (name) => {
    setRestarting(name);
    try {
      const r = await post("/api/restart", { services: [name] });
      setTimeout(() => { loadServices(); refresh(); }, 1500);
      if (r.results && r.results[0] && !r.results[0].ok) alert(r.results[0].message);
    } finally { setRestarting(null); }
  };

  const budget = (snap && snap.budget) || {};
  const pct = budget.monthly_budget ? Math.min(100, (budget.spend / budget.monthly_budget) * 100) : 0;
  const barGrad = budget.level === "over"   ? "linear-gradient(90deg, #FF3B30, #FF9F0A)"
                : budget.level && budget.level.startsWith("warn")
                  ? "linear-gradient(90deg, #FF9F0A, #FFCC00)"
                  : "linear-gradient(90deg, #34C759, #007AFF)";

  return (
    <div className="px-4 space-y-4 pb-32">
      <motion.div
        initial={{ opacity: 0, y: 12, scale: 0.97 }}
        animate={{ opacity: 1, y: 0, scale: 1 }}
        transition={spring}
        className="glass p-4"
      >
        <div className="text-xs uppercase tracking-wider text-secondary font-semibold mb-3">Service health</div>
        <div className="space-y-2">
          {services.map((s, i) => (
            <motion.div
              key={s.service}
              initial={{ opacity: 0, x: -8 }}
              animate={{ opacity: 1, x: 0 }}
              transition={{ ...spring, delay: Math.min(i * 0.02, 0.2) }}
              className="flex items-center justify-between py-2 px-1"
            >
              <div className="flex items-center gap-2 min-w-0">
                <span className={"dot " + statusDot(s.state)}></span>
                <span className="font-mono text-[13px] truncate">{s.service}</span>
                <span className="text-xs text-tertiary">{s.state}</span>
              </div>
              <motion.button
                whileTap={{ scale: 0.9 }} transition={spring}
                onClick={() => restart(s.service)} disabled={restarting === s.service}
                className="btn-pill"
              >
                {restarting === s.service ? "…" : "restart"}
              </motion.button>
            </motion.div>
          ))}
        </div>
      </motion.div>

      <motion.div
        initial={{ opacity: 0, y: 12, scale: 0.97 }}
        animate={{ opacity: 1, y: 0, scale: 1 }}
        transition={{ ...spring, delay: 0.05 }}
        className="glass-tinted-blue p-5"
      >
        <div className="text-xs uppercase tracking-wider font-semibold mb-3" style={{color: "#007AFF"}}>Claude Code budget</div>
        <div className="text-3xl font-bold tracking-tight" style={{color: "#1A1F4F"}}>
          ${(budget.spend || 0).toFixed(2)}
          <span className="text-base font-medium text-secondary"> / ${(budget.monthly_budget || 50).toFixed(0)}</span>
        </div>
        <div className="mt-4 h-2 rounded-full overflow-hidden" style={{background: "rgba(255,255,255,0.5)"}}>
          <motion.div
            initial={{ width: 0 }}
            animate={{ width: pct + "%" }}
            transition={{ duration: 0.9, ease: [0.34, 1.56, 0.64, 1] }}
            className="h-full rounded-full"
            style={{ background: barGrad }}
          />
        </div>
        <div className="mt-2 text-xs text-secondary font-medium">
          {budget.level === "over"
            ? "Over budget — new dispatches require force."
            : `${pct.toFixed(0)}% used this month`}
        </div>
      </motion.div>

      <motion.div
        initial={{ opacity: 0, y: 12, scale: 0.97 }}
        animate={{ opacity: 1, y: 0, scale: 1 }}
        transition={{ ...spring, delay: 0.1 }}
        className="glass p-4"
      >
        <div className="text-xs uppercase tracking-wider text-secondary font-semibold mb-2">Connection</div>
        <div className="text-[13px] space-y-1 font-mono" style={{color: "#1A1F4F"}}>
          <div><span className="text-secondary">API</span>  {API}</div>
          <div><span className="text-secondary">WS </span>  {API.replace(/^http/, "ws")}/ws/events</div>
          <div><span className="text-secondary">Tailscale</span>  100.124.210.84:11438</div>
        </div>
      </motion.div>
    </div>
  );
}

// ── App shell ───────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");
  const [snap, setSnap] = useState(null);
  const { events, connected } = useEvents();

  const refresh = useCallback(() => {
    get("/api/dispatches?limit=20").then(setSnap).catch(() => {});
  }, []);
  useEffect(() => { refresh(); const t = setInterval(refresh, 4000); return () => clearInterval(t); }, [refresh]);

  useEffect(() => {
    if (!events.length) return;
    const ev = events[0].event || "";
    if (ev.startsWith("cc_dispatch_")) refresh();
  }, [events, refresh]);

  return (
    <div className="min-h-screen flex flex-col">
      <Header tab={tab} connected={connected} />
      <AnimatePresence mode="wait">
        <motion.div
          key={tab}
          initial={{ opacity: 0, y: 8 }}
          animate={{ opacity: 1, y: 0 }}
          exit={{ opacity: 0, y: -4 }}
          transition={spring}
        >
          {tab === "home"     && <HomeTab     events={events} snap={snap} />}
          {tab === "dispatch" && <DispatchTab snap={snap} refresh={refresh} />}
          {tab === "memory"   && <MemoryTab />}
          {tab === "settings" && <SettingsTab snap={snap} refresh={refresh} />}
        </motion.div>
      </AnimatePresence>
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}
</script>
