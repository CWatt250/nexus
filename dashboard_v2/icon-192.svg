<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E0E7FF"/>
      <stop offset="50%"  stop-color="#F5E0FF"/>
      <stop offset="100%" stop-color="#FFE0F0"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#AF52DE"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <rect width="192" height="192" rx="42" fill="url(#glow)"/>
  <text x="50%" y="58%" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', Inter, sans-serif"
        font-weight="800" font-size="120" fill="url(#letter)"
        letter-spacing="-4">N</text>
  <rect x="3" y="3" width="186" height="186" rx="40"
        fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2"/>
</svg>
